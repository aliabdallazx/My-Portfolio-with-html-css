<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - ALZAIM Ali</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="#" class="logo">ALZAIM Ali</a>
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#About">About</a></li>
                    <li><a href="index.html#Skills">Skills</a></li>
                    <li><a href="index.html#services">Services</a></li>
                    <li><a href="index.html#Products">Products</a></li>
                    <li><a href="index.html#Contact">Contact</a></li>
                    <li><a href="index.html#blog">Blog</a></li>
                    <li class="auth-buttons">
                        <a href="login.html" class="auth-btn login-btn">Login</a>
                        <a href="sign-up.html" class="auth-btn signup-btn">Sign Up</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-container">
        <div class="container">
            <form class="login-form">
                <h2>Login to Your Account</h2>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">Login</button>
                <div class="signup-link">
                    Don't have an account? <a href="sign-up.html">Sign up here</a>
                </div>
            </form>
        </div>
    </section>

    <script src="auth.js"></script>
   
</body>
</html>
